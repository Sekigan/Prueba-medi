services:
  web:
    build: .
    container_name: fastapi_contenedor
    ports:
      - 8000:8000
    volumes:
      - ./app:/app
#    depends_on:
#      db:
#        condition: service_healthy
#        restart: true
    env_file:
      - .env
  db:
    image: postgres:15
    container_name: postgres
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_ready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  postgres_db:
